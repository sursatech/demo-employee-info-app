# .github/dependabot.yml
version: 2
updates:
  # Updates for Bun dependencies (package.json + bun.lock)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"           # Change to "daily" if you want faster updates
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "bun"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Optional but recommended: Keep GitHub Actions updated
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
